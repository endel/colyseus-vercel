<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colyseus on Vercel — demo</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background: #0b0e14; color: #d6deeb; }
    header { padding: 12px 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid #1c2333; }
    h1 { font-size: 14px; margin: 0; font-weight: 600; }
    input, button { font: inherit; background: #11151f; color: #d6deeb; border: 1px solid #2a3447; border-radius: 6px; padding: 6px 10px; }
    button { cursor: pointer; }
    button:hover:not(:disabled) { border-color: #5a7fff; }
    button:disabled { opacity: 0.5; cursor: default; }
    #status { font-size: 12px; padding: 2px 8px; border-radius: 999px; border: 1px solid #2a3447; }
    .ok { color: #9ece6a; border-color: #2e4a1f !important; }
    .err { color: #f7768e; border-color: #5a2030 !important; }
    .pending { color: #e0af68; border-color: #5a4a1f !important; }
    main { display: flex; gap: 12px; padding: 12px 16px; flex-wrap: wrap; }
    canvas { background: #070a10; border: 1px solid #1c2333; border-radius: 8px; cursor: crosshair; touch-action: none; }
    aside { width: 320px; display: flex; flex-direction: column; gap: 8px; }
    #log { flex: 1; min-height: 200px; background: #070a10; border: 1px solid #1c2333; border-radius: 8px; padding: 8px; font-size: 12px; overflow-y: auto; white-space: pre-wrap; }
    .hint { font-size: 12px; opacity: 0.6; }
    .row { display: flex; gap: 6px; }
    .row input { flex: 1; }
    a.source { font-size: 12px; color: #8ba0c9; text-decoration: none; border: 1px solid #2a3447; border-radius: 6px; padding: 6px 10px; display: inline-flex; align-items: center; gap: 6px; }
    a.source:hover { border-color: #5a7fff; color: #d6deeb; }
    a.source svg { width: 14px; height: 14px; fill: currentColor; }
  </style>
</head>
<body>
  <header>
    <h1>⚔️ Colyseus × Vercel</h1>
    <a class="source" href="https://github.com/endel/colyseus-vercel" target="_blank" rel="noopener">
      <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.03 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      source
    </a>
    <input id="endpoint" size="34" />
    <input id="name" placeholder="your name" size="12" />
    <button id="toggle">connect</button>
    <span id="status" class="err">disconnected</span>
  </header>

  <main>
    <canvas id="board" width="800" height="600"></canvas>
    <aside>
      <div class="hint">auto-connects on load. click the board to move — entities glide to their target. open a second tab to see realtime sync. drops auto-reconnect (dropped players dim with a ⟳ until they return). debug panel sits bottom-right.</div>
      <div class="row">
        <input id="chat" placeholder="say something…" />
        <button id="send">send</button>
      </div>
      <div id="log"></div>
    </aside>
  </main>

  <script type="module">
    // ?bundle=false so the SDK and the debug panel share the same internal
    // Client module — the panel patches Client.prototype to auto-track rooms,
    // which only works if both resolve to the same module instance.
    import { Client, getStateCallbacks } from "https://esm.sh/@colyseus/sdk@0.17.43?bundle=false";
    import "https://esm.sh/@colyseus/sdk@0.17.43/debug?bundle=false"; // floating realtime room inspector

    const $ = (id) => document.getElementById(id);
    const canvas = $("board");
    const ctx = canvas.getContext("2d");

    // wss://host on Vercel; ws://localhost:2567 when opened from a file/local dev
    const defaultEndpoint =
      location.protocol.startsWith("http") && location.hostname !== "localhost"
        ? location.origin.replace(/^http/, "ws")
        : "ws://localhost:2567";
    $("endpoint").value = defaultEndpoint;
    $("name").value = "player-" + Math.floor(Math.random() * 1000);

    // sessionId -> { name, color, x, y, tx, ty }  (x/y rendered, tx/ty target from server)
    const players = new Map();
    let room = null;
    let mySessionId = null;
    let connecting = false;
    let intentionalLeave = false;

    function log(msg) {
      const el = $("log");
      el.textContent += msg + "\n";
      el.scrollTop = el.scrollHeight;
    }
    function setStatus(text, cls) {
      const el = $("status");
      el.textContent = text;
      el.className = cls;
    }
    function setToggle(label, disabled) {
      const btn = $("toggle");
      btn.textContent = label;
      btn.disabled = !!disabled;
    }

    // ---- render loop: interpolate every entity toward its target every frame ----
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const [sid, p] of players) {
        const me = sid === mySessionId;
        ctx.globalAlpha = p.connected === false ? 0.3 : 1; // dim players awaiting reconnection
        ctx.beginPath();
        ctx.arc(p.x, p.y, me ? 12 : 9, 0, Math.PI * 2);
        ctx.fillStyle = p.color || "#5a7fff";
        ctx.fill();
        if (me) { ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke(); }
        ctx.fillStyle = "#d6deeb";
        ctx.font = "12px ui-monospace, monospace";
        ctx.fillText(p.name + (me ? " (you)" : "") + (p.connected === false ? " ⟳" : ""), p.x + 14, p.y + 4);
        ctx.globalAlpha = 1;
      }
    }
    let last = performance.now();
    function frame(now) {
      const dt = Math.min((now - last) / 1000, 0.1);
      last = now;
      const a = 1 - Math.exp(-dt * 10); // framerate-independent smoothing
      for (const p of players.values()) {
        p.x += (p.tx - p.x) * a;
        p.y += (p.ty - p.y) * a;
      }
      draw();
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // ---- connection lifecycle ----
    async function connect() {
      if (connecting || room) return;
      connecting = true;
      intentionalLeave = false;
      setStatus("connecting…", "pending");
      setToggle("connecting…", true);
      try {
        const client = new Client($("endpoint").value);
        room = await client.joinOrCreate("my_room", { name: $("name").value });
        mySessionId = room.sessionId;
        setStatus("connected · " + room.roomId, "ok");
        setToggle("disconnect", false);
        log("joined room " + room.roomId + " as " + room.sessionId);

        // demonstrate plain Express HTTP routes on the same server
        try {
          const httpBase = $("endpoint").value.replace(/^ws/, "http");
          const health = await (await fetch(httpBase + "/api/health")).json();
          log("HTTP GET /api/health → " + JSON.stringify(health));
        } catch { /* ignore */ }

        const $$ = getStateCallbacks(room);
        $$(room.state).players.onAdd((player, sessionId) => {
          const p = { name: player.name, color: player.color, connected: player.connected, x: player.x, y: player.y, tx: player.x, ty: player.y };
          players.set(sessionId, p);
          $$(player).onChange(() => {
            p.name = player.name; p.color = player.color; p.connected = player.connected;
            p.tx = player.x; p.ty = player.y; // update target — frame loop interpolates
          });
          log("+ " + player.name + " joined");
        });
        $$(room.state).players.onRemove((_player, sessionId) => {
          players.delete(sessionId);
          log("- " + sessionId + " left");
        });

        room.onMessage("chat", ({ name, text }) => log(name + ": " + text));
        room.onError((code, message) => log("room error " + code + ": " + message));

        // connection dropped unexpectedly — the SDK auto-reconnects (exp backoff)
        room.onDrop((code) => {
          setStatus("reconnecting…", "pending");
          setToggle("cancel", false);
          log("⚠ connection dropped (" + code + ") — reconnecting…");
        });
        room.onReconnect(() => {
          mySessionId = room.sessionId;
          setStatus("connected · " + room.roomId, "ok");
          setToggle("disconnect", false);
          log("✅ reconnected");
        });

        room.onLeave((code) => {
          const wasIntentional = intentionalLeave;
          room = null; mySessionId = null; connecting = false;
          players.clear();
          setStatus(wasIntentional ? "disconnected" : "disconnected (" + code + ")", "err");
          setToggle("connect", false);
          log("left room" + (wasIntentional ? "" : ", code=" + code));
        });
      } catch (e) {
        room = null; connecting = false;
        setStatus("failed", "err");
        setToggle("connect", false);
        log("connect error: " + (e?.message || e));
        console.error(e);
        return;
      }
      connecting = false;
    }

    function disconnect() {
      if (!room) return;
      intentionalLeave = true;
      setToggle("disconnecting…", true);
      room.leave(); // triggers room.onLeave → resets UI
    }

    // ---- movement (sets target; frame loop interpolates) ----
    function move(x, y) {
      if (!room) return;
      x = Math.max(0, Math.min(canvas.width, x));
      y = Math.max(0, Math.min(canvas.height, y));
      const me = players.get(mySessionId);
      if (me) { me.tx = x; me.ty = y; } // optimistic target; server confirms via onChange
      room.send("move", { x, y });
    }

    canvas.addEventListener("pointerdown", (e) => {
      const r = canvas.getBoundingClientRect();
      move(e.clientX - r.left, e.clientY - r.top);
    });

    function sendChat() {
      const text = $("chat").value.trim();
      if (text && room) { room.send("chat", text); $("chat").value = ""; }
    }
    $("toggle").addEventListener("click", () => (room ? disconnect() : connect()));
    $("send").addEventListener("click", sendChat);
    $("chat").addEventListener("keydown", (e) => { if (e.key === "Enter") sendChat(); });

    connect(); // auto-connect on page load
  </script>
</body>
</html>
